# ── Database Connection ──
spring.datasource.url=jdbc:mysql://localhost:3306/hrms_db
spring.datasource.username=hrms_user
spring.datasource.password=hrms1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server ──
server.port=8080
spring.application.name=hr-backend


# JWT
jwt.secret=hrms_super_secret_key_2024_make_it_long_enough_for_security
jwt.expiration=86400000

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Work Schedule defaults
work.start.time=09:00
work.end.time=18:00
work.grace.period.minutes=15
work.required.hours=8

spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.write-dates-as-timestamps=false

